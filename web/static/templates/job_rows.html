{{$page := 1}}
{{if gt (len .) 0}}
    {{$page = (index . 0).Page}}
{{end}}
{{range .}}
<tr>
    <td>{{.ID}}</td>
    <td>{{.Name}}</td>
    <td>{{.Date}}</td>
    <td>
        <span class="status-indicator status-{{.Status}}">{{.Status}}</span>
    </td>
    <td>
        {{ if eq .Status "ok" }}
        <a href="/download?id={{.ID}}" download class="button download-button"
            >下载</a
        >
        {{ end }}
        <button
            hx-delete="/delete?id={{.ID}}"
            hx-target="closest tr"
            hx-swap="outerHTML"
            hx-confirm="确定要删除这个任务吗？"
            class="delete-button"
        >
            删除
        </button>
    </td>
</tr>
{{end}}
<tr id="pagination-controls">
    <td
        colspan="5"
        style="
            text-align: center;
            padding: 15px;
            background-color: #f9f9f9;
            border-top: 1px solid #eee;
        "
    >
        <button
            type="button"
            id="prev-btn"
            style="
                padding: 6px 16px;
                margin: 0 10px;
                cursor: pointer;
                background: #0084ff;
                color: white;
                border: 1px solid #006bce;
                border-radius: 4px;
                font-weight: 600;
            "
            onclick="changePage(-1)"
        >
            ⬅️ 上一页
        </button>
        <span style="font-weight: 500; color: #333"
            >第 <span id="current-page-text">{{$page}}</span> 页</span
        >
        <button
            type="button"
            id="next-btn"
            style="
                padding: 6px 16px;
                margin: 0 10px;
                cursor: pointer;
                background: #0084ff;
                color: white;
                border: 1px solid #006bce;
                border-radius: 4px;
                font-weight: 600;
            "
            onclick="changePage(1)"
            {{if
            lt
            (len
            .)
            10}}disabled{{end}}
        >
            下一页 ➡️
        </button>

        <script>
            (function() {
                // 从当前HTML中提取页码
                const pageText = document.getElementById("current-page-text").innerText;
                const currentPageFromServer = parseInt(pageText) || 1;
                
                // 同步到全局变量
                window.currentPage = currentPageFromServer;
                
                // 更新 tbody 的 hx-get 属性
                let tbody = document.querySelector("#job-table tbody");
                if (tbody) {
                    tbody.setAttribute("hx-get", "/jobs?page=" + window.currentPage);
                    htmx.process(tbody);
                }

                // 更新上一页按钮状态
                if (window.currentPage <= 1) {
                    let pb = document.getElementById("prev-btn");
                    if (pb) {
                        pb.disabled = true;
                        pb.style.background = "#f0f2f5";
                        pb.style.color = "#a0a0a0";
                        pb.style.borderColor = "#ccc";
                        pb.style.cursor = "not-allowed";
                    }
                }

                // 更新下一页按钮状态
                let nb = document.getElementById("next-btn");
                if (nb && nb.hasAttribute("disabled")) {
                    nb.style.background = "#f0f2f5";
                    nb.style.color = "#a0a0a0";
                    nb.style.borderColor = "#ccc";
                    nb.style.cursor = "not-allowed";
                }
            })();

            window.changePage = function (delta) {
                let newPage = window.currentPage + delta;
                if (newPage < 1) newPage = 1;
                if (newPage !== window.currentPage) {
                    window.currentPage = newPage;
                    // 更新显示
                    let pageTextEl = document.getElementById("current-page-text");
                    if (pageTextEl) {
                        pageTextEl.innerText = window.currentPage;
                    }
                    // 直接请求新页面数据
                    htmx.ajax("GET", "/jobs?page=" + window.currentPage, {
                        target: "#job-table tbody",
                        swap: "innerHTML"
                    });
                }
            };
        </script>
    </td>
</tr>
