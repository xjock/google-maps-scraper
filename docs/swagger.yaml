basePath: /
definitions:
  api.DeleteJobResponse:
    description: 成功将任务加入删除队列后返回的响应
    properties:
      message:
        description: 状态信息
        example: deletion queued
        type: string
    type: object
  api.ErrorResponse:
    description: 请求失败时返回的错误响应
    properties:
      message:
        example: invalid request body
        type: string
    type: object
  api.HealthCheckResponse:
    description: 指示服务状态的健康检查响应
    properties:
      status:
        example: ok
        type: string
    type: object
  api.JobStatusResponse:
    description: 抓取任务的详细状态（完成后将包含结果）
    properties:
      completed_at:
        description: 任务完成时间
        example: "2024-01-15T10:35:00Z"
        type: string
      created_at:
        description: 任务创建时间
        example: "2024-01-15T10:30:00Z"
        type: string
      error:
        description: 任务失败时的错误信息
        example: ""
        type: string
      job_id:
        description: 唯一任务标识符
        example: kYzR8xLmNpQvWjX3
        type: string
      keyword:
        description: 用于此任务的搜索关键词
        example: restaurants in New York
        type: string
      result_count:
        description: 找到的结果数量
        example: 25
        type: integer
      results:
        description: 抓取结果（地点数据数组）
      started_at:
        description: 任务开始处理的时间
        example: "2024-01-15T10:30:05Z"
        type: string
      status:
        description: 当前任务状态 (pending, running, completed, failed)
        example: completed
        type: string
    type: object
  api.JobSummary:
    description: 不包含完整结果数据的任务摘要
    properties:
      completed_at:
        description: 任务完成时间
        example: "2024-01-15T10:35:00Z"
        type: string
      created_at:
        description: 任务创建时间
        example: "2024-01-15T10:30:00Z"
        type: string
      error:
        description: 任务失败时的错误信息
        example: ""
        type: string
      job_id:
        description: 唯一任务标识符
        example: kYzR8xLmNpQvWjX3
        type: string
      keyword:
        description: 用于此任务的搜索关键词
        example: restaurants in New York
        type: string
      result_count:
        description: 找到的结果数量
        example: 25
        type: integer
      started_at:
        description: 任务开始处理的时间
        example: "2024-01-15T10:30:05Z"
        type: string
      status:
        description: 当前任务状态
        example: completed
        type: string
    type: object
  api.ListJobsResponse:
    description: 带有下一页游标的分页任务列表
    properties:
      has_more:
        description: 是否有更多结果
        example: true
        type: boolean
      jobs:
        description: 任务列表
        items:
          $ref: '#/definitions/api.JobSummary'
        type: array
      next_cursor:
        description: 下一页的游标（如果没有更多结果则为空）
        example: eyJpZCI6MTIzfQ==
        type: string
    type: object
  api.ScrapeRequest:
    description: 提交抓取任务的请求体
    properties:
      email:
        description: 是否从网站中提取电子邮件地址
        example: false
        type: boolean
      extra_reviews:
        description: 提取更多评论
        example: false
        type: boolean
      fast_mode:
        description: 使用快速模式（使用隐身 HTTP 请求代替浏览器）
        example: false
        type: boolean
      geo_coordinates:
        description: 地理坐标，格式为 "纬度,经度"
        example: 40.7128,-74.0060
        type: string
      keyword:
        description: 搜索关键词（例如："纽约的餐厅"）
        example: restaurants in New York
        type: string
      lang:
        description: 结果语言代码（默认："zh-CN"）
        example: zh-CN
        type: string
      max_depth:
        description: 分页的最大深度（默认：1，最大：100）
        example: 1
        type: integer
      radius:
        description: 搜索半径（公里）
        example: 5
        type: number
      timeout:
        description: 任务超时时间，单位秒（1-300，默认：300）
        example: 300
        type: integer
      zoom:
        description: 地图搜索缩放级别 (1-21)
        example: 14
        type: integer
    type: object
  api.ScrapeResponse:
    description: 成功提交抓取任务后返回的响应
    properties:
      job_id:
        description: 唯一任务标识符
        example: kYzR8xLmNpQvWjX3
        type: string
      status:
        description: 当前任务状态
        example: pending
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: API 支持
    url: https://github.com/xjock/google-maps-scraper
  description: 用于异步抓取 Google Maps 数据的 API
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Google Maps 抓取 Pro API
  version: "1.0"
paths:
  /api/v1/health:
    get:
      description: 检查 API 服务是否健康
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HealthCheckResponse'
      summary: 健康检查
      tags:
      - health
  /api/v1/jobs:
    get:
      description: 分页列出所有抓取任务，支持按状态过滤
      parameters:
      - description: 按状态过滤 (available, running, completed, cancelled, discarded, pending,
          retryable, scheduled)
        in: query
        name: state
        type: string
      - description: 返回的任务数量（默认：20，最大：100）
        in: query
        name: limit
        type: integer
      - description: 用于分页的游标
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ListJobsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 获取任务列表
      tags:
      - scrape
  /api/v1/jobs/{job_id}:
    delete:
      description: 将任务及其结果放入删除队列。运行中的任务会被优先取消。
      parameters:
      - description: 任务 ID
        in: path
        name: job_id
        required: true
        type: string
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/api.DeleteJobResponse'
        "400":
          description: 无效的任务 ID
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: 未找到指定任务
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 删除任务
      tags:
      - scrape
    get:
      description: 获取抓取任务的状态和结果
      parameters:
      - description: 任务 ID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.JobStatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 获取任务状态
      tags:
      - scrape
  /api/v1/scrape:
    post:
      consumes:
      - application/json
      description: 提交一个新的 Google Maps 抓取任务进行处理
      parameters:
      - description: 抓取请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.ScrapeRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/api.ScrapeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 提交抓取任务
      tags:
      - scrape
schemes:
- http
- https
swagger: "2.0"
